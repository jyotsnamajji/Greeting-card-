<!DOCTYPE html>
<html>
<head>
<title>Recreated Image</title>

<style>

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#87CEEB;
}

.house{
    width:200px;
    height:150px;
    background:#ffcc66;
    position:relative;
}

.roof{
    width:0;
    height:0;
    border-left:110px solid transparent;
    border-right:110px solid transparent;
    border-bottom:100px solid brown;
    position:absolute;
    top:-100px;
    left:-10px;
}

.door{
    width:40px;
    height:70px;
    background:#663300;
    position:absolute;
    bottom:0;
    left:80px;
}

.window{
    width:40px;
    height:40px;
    background:white;
    position:absolute;
    top:40px;
    left:20px;
}

</style>

</head>

<body>

<div class="house">
    <div class="roof"></div>
    <div class="door"></div>
    <div class="window"></div>
</div>

</body>
</html>
